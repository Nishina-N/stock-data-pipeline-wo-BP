name: JP Daily Stock Data Update

on:
  schedule:
    - cron: '0 9 * * 1-5'  # UTC 09:00 = JST 18:00（東証15:00引け後、月-金）
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      max-parallel: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        continue-on-error: false
        timeout-minutes: 5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        timeout-minutes: 10

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        timeout-minutes: 10

      - name: Create data directory
        run: mkdir -p data

      - name: 0. Download JP universe
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/jp/0_download_jp_universe.py
        timeout-minutes: 20

      - name: 1. Fetch JP prices (直近1000日)
        env:
          PYTHONUTF8: "1"
        run: python scripts/jp/1_fetch_jp_prices.py --start $(date -u -d '1000 days ago' +%Y-%m-%d)
        timeout-minutes: 60

      - name: 2. Calculate JP RS
        env:
          PYTHONUTF8: "1"
        run: python scripts/jp/2_calculate_jp_rs.py
        timeout-minutes: 30

      - name: 3. Export to JSON (R2 format)
        env:
          PYTHONUTF8: "1"
        run: python scripts/jp/3_export_jp_json.py
        timeout-minutes: 40

      - name: 4. Upload to R2 (過去年凍結・当年上書き)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/jp/4_upload_jp_r2.py --execute
        timeout-minutes: 60

      - name: Cleanup temporary files
        if: always()
        run: rm -rf data/*

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jp-pipeline-logs-${{ github.run_id }}
          path: |
            *.log
          retention-days: 7
