name: Intraday Stock Data Update (5min)

on:
  schedule:
    - cron: '30 22 * * 1-5'  # Mon-Fri 22:30 UTC（Daily Update の約30分後）
  workflow_dispatch:

jobs:
  intraday:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        timeout-minutes: 10

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        timeout-minutes: 10

      - name: Create data directories
        run: mkdir -p data/intraday/r2

      - name: Download target stocks from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/daily/0_download_target_stocks.py
        timeout-minutes: 10

      - name: 1. Fetch 5-min intraday data (60 days)
        run: python scripts/intraday/1_fetch_5min.py
        timeout-minutes: 60

      - name: 2. Export to monthly JSON
        run: python scripts/intraday/2_export_to_json.py
        timeout-minutes: 20

      - name: 3. Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/intraday/3_upload_to_r2.py
        timeout-minutes: 30

      - name: Cleanup temporary files
        if: always()
        run: rm -rf data/intraday/*

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: intraday-logs-${{ github.run_id }}
          path: |
            *.log
          retention-days: 7
