name: Monthly Fetch Target Stocks

on:
  schedule:
    - cron: '0 0 1 * *'  # 毎月1日 00:00 UTC
  workflow_dispatch:  # 手動実行も可能

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Fetch target stocks
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/daily/1_fetch_target_stocks.py
      
      - name: Upload target stocks to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/monthly/upload_target_stocks_to_r2.py
      
      - name: Cleanup
        if: always()
        run: rm -rf data/*
