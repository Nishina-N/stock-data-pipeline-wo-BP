name: Daily Stock Data Update

on:
  schedule:
    - cron: '0 22 * * 1-5'  # Mon-Fri 21:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    strategy:
      fail-fast: false
      max-parallel: 1
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        continue-on-error: false
        timeout-minutes: 5
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        timeout-minutes: 10
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        timeout-minutes: 10
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: 0. Download target stocks
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/daily/0_download_target_stocks.py
        timeout-minutes: 20
      
      - name: 2. Fetch price data (1000 days)
        run: python scripts/daily/2_fetch_price_data.py
        timeout-minutes: 60
      
      - name: 2.5. Convert price data to JSON (OHLCV)
        run: python scripts/daily/2.5_add_indicators.py
        timeout-minutes: 40

      - name: 3. Calculate RS
        run: python scripts/daily/3_calculate_rs.py
        timeout-minutes: 40

      - name: 4. Export to JSON (R2 format)
        run: python scripts/daily/4_export_to_json.py
        timeout-minutes: 40

      - name: 5. Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/daily/5_upload_to_r2.py
        timeout-minutes: 120
      
      - name: 6. Fetch market/macro series (YTD)
        run: python scripts/market/fetch_market_series.py --start $(date -u +%Y-01-01)
        timeout-minutes: 20

      - name: 7. Build market by year (merge into R2)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/market/build_market_by_year.py --merge
        timeout-minutes: 10

      - name: 8. Upload market to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/market/upload_market_to_r2.py --execute
        timeout-minutes: 20

      - name: Cleanup temporary files
        if: always()
        run: rm -rf data/*
      
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: |
            *.log
          retention-days: 7
