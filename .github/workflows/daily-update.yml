name: Daily Stock Data Update

on:
  schedule:
    - cron: '0 21 * * 1-5'  # Mon-Fri 21:00 UTC (after US market close)
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: 1. Fetch target stocks
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/daily/1_fetch_target_stocks.py
      
      - name: 2. Fetch price data (1000 days)
        run: python scripts/daily/2_fetch_price_data.py
      
      - name: 2.5. Add technical indicators
        run: python scripts/daily/2.5_add_indicators.py
      
      - name: 3. Calculate RS and RRS
        run: python scripts/daily/3_calculate_rs.py
      
      - name: 4. Export to JSON (R2 format)
        run: python scripts/daily/4_export_to_json.py
      
      - name: 5. Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/daily/5_upload_to_r2.py
      
      - name: Cleanup temporary files
        if: always()
        run: rm -rf data/*
      
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: |
            *.log
          retention-days: 7
